site_name: pysepal-api
site_description: UI-free HTTP client for SEPAL platform services (user files, tasks, recipes).
site_url: https://dfguerrerom.github.io/pysepal-api/
repo_url: https://github.com/dfguerrerom/pysepal-api
repo_name: dfguerrerom/pysepal-api

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            filters: ["!^_"]
            show_root_heading: true
            show_source: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true

exclude_docs: |
  superpowers/

nav:
  - Home: index.md
